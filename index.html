<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطوط الطالب | Student Fonts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Tajawal:wght@300;500;800&family=Amiri&family=Changa:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .font-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 tracking-tighter">FONTS.EDU</h1>
            <div class="space-x-4 space-x-reverse text-sm font-medium">
                <a href="#" class="text-gray-600 hover:text-blue-600">الرئيسية</a>
                <a href="#" class="text-gray-600 hover:text-blue-600">الأكثر تحميلاً</a>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-blue-600 to-indigo-700 py-16 px-4 text-white text-center">
        <h2 class="text-4xl md:text-5xl font-bold mb-4">خطوط احترافية لتقاريرك الجامعية</h2>
        <p class="text-blue-100 max-w-2xl mx-auto text-lg">اجعل بحوثك ومشاريعك تتميز بلمسة بصرية عصرية. جرب الخط قبل التحميل.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        
        <section class="mb-12 bg-white p-6 rounded-2xl shadow-xl -mt-20 border border-gray-100">
            <label class="block text-sm font-bold text-gray-700 mb-2">جرب النص الخاص بك هنا:</label>
            <input type="text" id="fontTester" placeholder="اكتب عنوان بحثك أو اسمك..." 
                   class="w-full p-4 border-2 border-gray-100 rounded-xl focus:border-blue-500 focus:outline-none text-xl transition-all">
        </section>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="fontsGrid">
            <div class="font-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold bg-blue-100 text-blue-700 py-1 px-3 rounded-full">عصري</span>
                        <span class="text-gray-400 text-xs">Cairo Font</span>
                    </div>
                    <p class="preview-text text-3xl mb-6" style="font-family: 'Cairo';">أبجد هووز حطي كلمن</p>
                </div>
                <button class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors flex items-center justify-center gap-2">
                    تحميل الخط
                </button>
            </div>

            <div class="font-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold bg-purple-100 text-purple-700 py-1 px-3 rounded-full">رسمي</span>
                        <span class="text-gray-400 text-xs">Tajawal Font</span>
                    </div>
                    <p class="preview-text text-3xl mb-6" style="font-family: 'Tajawal';">هذا الخط مثالي للملخصات</p>
                </div>
                <button class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors">تحميل الخط</button>
            </div>

            <div class="font-card bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold bg-green-100 text-green-700 py-1 px-3 rounded-full">كلاسيكي</span>
                        <span class="text-gray-400 text-xs">Amiri Font</span>
                    </div>
                    <p class="preview-text text-3xl mb-6" style="font-family: 'Amiri';">جمالية الخط العربي الأصيل</p>
                </div>
                <button class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition-colors">تحميل الخط</button>
            </div>
        </div>
    </main>

    <footer class="text-center py-10 text-gray-500 text-sm">
        تم التطوير لطلاب الجامعات &copy; 2026
    </footer>

    <script>
        const tester = document.getElementById('fontTester');
        const previews = document.querySelectorAll('.preview-text');

        tester.addEventListener('input', (e) => {
            const val = e.target.value;
            previews.forEach(p => {
                p.innerText = val || "أبجد هووز حطي كلمن";
            });
        });
    </script>
</body>
</html>
