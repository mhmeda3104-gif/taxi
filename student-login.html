<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول الطالب | TOP car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(45deg, #0f172a, #1e293b, #334155);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(59, 130, 246, 0.5); /* Blue focus */
            outline: none;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .btn-blue {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-8 relative overflow-hidden">
        
        <a href="index.html" class="absolute top-6 right-6 text-gray-400 hover:text-white transition-colors text-sm flex items-center gap-1 font-bold">
            <span>رجوع</span>
            <span class="text-lg">→</span>
        </a>

        <div class="text-center mt-6 mb-10">
            <div class="inline-flex w-16 h-16 bg-blue-500/20 rounded-2xl items-center justify-center text-3xl mb-4">
                🎓
            </div>
            <h2 class="text-2xl font-black text-white">بوابة الطالب</h2>
            <p class="text-gray-400 text-xs mt-2">سجل دخولك لحجز مقعدك في خطك المفضل</p>
        </div>

        <form class="space-y-5">
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-300 mr-2">البريد الجامعي أو الهاتف</label>
                <input type="text" placeholder="student@university.edu" 
                       class="w-full glass-input p-4 rounded-2xl text-sm placeholder:text-gray-600">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-300 mr-2">كلمة المرور</label>
                <input type="password" placeholder="••••••••" 
                       class="w-full glass-input p-4 rounded-2xl text-sm placeholder:text-gray-600">
            </div>

            <div class="flex justify-between items-center px-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-blue-500 focus:ring-blue-500 bg-transparent">
                    <span class="text-[10px] text-gray-400">حفظ البيانات</span>
                </label>
                <a href="#" class="text-[10px] text-blue-400 hover:underline">مشكلة في الدخول؟</a>
            </div>

            <button type="submit" class="w-full btn-blue text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest mt-4 transition-transform active:scale-95">
                دخول الطالب
            </button>
        </form>

        <div class="mt-10 pt-6 border-t border-white/5 text-center">
            <p class="text-xs text-gray-500 mb-4">طالب جديد في TOP car؟</p>
            <div class="flex gap-3">
                <button class="flex-1 bg-white/5 border border-white/10 text-white py-3 rounded-xl text-xs font-bold hover:bg-white/10 transition-all">
                    إنشاء حساب
                </button>
                <button class="flex-1 bg-white/5 border border-white/10 text-white py-3 rounded-xl text-xs font-bold hover:bg-white/10 transition-all">
                    دخول كزائر
                </button>
            </div>
        </div>

    </div>
<script type="module">
  // 1. استيراد المكتبات من جوجل مباشرة
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  // 2. إعدادات مشروعك (استبدلها بالبيانات التي ستجدها في Project Settings)
  const firebaseConfig = {
    apiKey: "AIzaSyAx0ZWDCU6Z8VG9GXmKOC-4QLPXCTmjXsg",
    authDomain: "top-car-2599b.firebaseapp.com",
    projectId: "top-car-2599b",
    storageBucket: "top-car-2599b.firebasestorage.app",
    messagingSenderId: "565891185232",
    appId: "1:565891185232:web:4d77509e055877b5fdaf55"
  };

  // 3. تشغيل Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // 4. دالة التسجيل (عند الضغط على زر دخول الطالب مثلاً للتجربة)
  const loginBtn = document.querySelector('.btn-blue');
  
  loginBtn.addEventListener('click', (e) => {
    e.preventDefault();
    const email = document.querySelector('input[type="text"]').value;
    const password = document.querySelector('input[type="password"]').value;

    if(email && password) {
        createUserWithEmailAndPassword(auth, email, password)
          .then((userCredential) => {
            alert("تم إنشاء الحساب بنجاح! الإيميل الآن محفوظ في Firebase");
            console.log("User:", userCredential.user);
            // الانتقال لصفحة الداشبورد
            window.location.href = "driver-dashboard.html"; 
          })
          .catch((error) => {
            alert("خطأ: " + error.message);
          });
    } else {
        alert("يرجى إدخال الإيميل والرمز");
    }
  });
</script>
</body>
</html>
