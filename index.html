<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP car | الرئيسية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(45deg, #0f172a, #1e293b, #334155);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* كود تحريك البكسل (Pixel Art Animation) */
        .bat-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            height: 50px;
        }

        .bat {
            width: 4px;
            height: 4px;
            background: white;
            position: relative;
            transform: scale(4);
            /* رسم تقريبي للشخصية باستخدام الظلال */
            box-shadow: 
                4px 0 white, -4px 0 white,
                0 4px white, 0 -4px white,
                8px 4px rgba(255,255,255,0.5), -8px 4px rgba(255,255,255,0.5);
            animation: bat-float 0.8s steps(2) infinite;
        }

        @keyframes bat-float {
            0%, 100% { transform: scale(4) translateY(0); }
            50% { transform: scale(4.5) translateY(-5px); box-shadow: 4px 2px white, -4px 2px white; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02) translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md w-full glass-card rounded-[3rem] p-10 text-center text-white relative overflow-hidden">
        
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-600 rounded-full mix-blend-overlay filter blur-3xl opacity-20"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-emerald-600 rounded-full mix-blend-overlay filter blur-3xl opacity-20"></div>

        <div class="bat-container">
            <div class="bat"></div>
        </div>

        <div class="mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                TOP car
            </h1>
            <p class="text-gray-400 text-[10px] mt-3 font-bold tracking-[0.3em] uppercase opacity-60">Smart Transport System</p>
        </div>

        <div class="space-y-5">
            
            <a href="student-login.html" class="glass-button p-6 rounded-[2rem] group">
                <div class="flex items-center gap-4 text-right">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center text-2xl group-hover:rotate-12 transition-transform">
                        🎓
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">بوابة الطلاب</h3>
                        <p class="text-[10px] text-gray-500 font-light tracking-wide">احجز مقعدك الآن</p>
                    </div>
                </div>
                <span class="text-xl opacity-0 group-hover:opacity-100 transition-all -translate-x-4 group-hover:translate-x-0">←</span>
            </a>

            <a href="driver-login.html" class="glass-button p-6 rounded-[2rem] group">
                <div class="flex items-center gap-4 text-right">
                    <div class="w-12 h-12 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-2xl group-hover:rotate-12 transition-transform">
                        🚕
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">بوابة الكابتن</h3>
                        <p class="text-[10px] text-gray-500 font-light tracking-wide">إدارة الرحلات والطلاب</p>
                    </div>
                </div>
                <span class="text-xl opacity-0 group-hover:opacity-100 transition-all -translate-x-4 group-hover:translate-x-0">←</span>
            </a>

        </div>

        <div class="mt-12 inline-flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full border border-white/10">
            <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Active Server</span>
        </div>
    </div>

</body>
</html>
