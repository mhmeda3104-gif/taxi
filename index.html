<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP car | توصيل الطلاب</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية متحركة لإظهار تأثير الزجاج */
            background: linear-gradient(45deg, #0f172a, #1e293b, #334155);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-8 text-center text-white relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>

        <div class="mb-8">
            <h1 class="text-4xl font-black tracking-widest italic text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                TOP car
            </h1>
            <p class="text-gray-400 text-sm mt-2 font-light">مرحباً بك، اختر طريقة الدخول</p>
        </div>

        <div class="space-y-6">
            
            <button onclick="window.location.href='#student-login'" class="w-full glass-button p-6 rounded-3xl flex items-center justify-between group">
                <div class="flex items-center gap-4 text-right">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        🎓
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">أنا طالبة / طالب</h3>
                        <p class="text-[10px] text-gray-400 font-light">للبحث عن خطوط وحجز مقعد</p>
                    </div>
                </div>
                <span class="text-xl opacity-0 group-hover:opacity-100 transition-opacity">←</span>
            </button>

            <button onclick="window.location.href='student-login'" class="w-full glass-button p-6 rounded-3xl flex items-center justify-between group">
                <div class="flex items-center gap-4 text-right">
                    <div class="w-12 h-12 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-2xl group-hover:scale-110 transition-transform">
                        🚕
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">أنا سائق</h3>
                        <p class="text-[10px] text-gray-400 font-light">لإضافة خطك وإدارة المشتركين</p>
                    </div>
                </div>
                <span class="text-xl opacity-0 group-hover:opacity-100 transition-opacity">←</span>
                <button onclick="window.location.href='driver-login'" class="w-full glass-button p-6 rounded-3xl flex items-center justify-between group">
    </button>
            </button>

        </div>

        <div class="mt-12">
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em]">Premium Transportation System</p>
            <div class="flex justify-center gap-4 mt-4">
                <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
                <div class="w-1.5 h-1.5 rounded-full bg-white/20"></div>
            </div>
        </div>
        <script>
    function showStudentLogin() {
        // إخفاء الصفحة الرئيسية
        document.getElementById('home-page').classList.add('hidden');
        // إظهار صفحة الطالب
        document.getElementById('student-page').classList.remove('hidden');
    }

    function goBack() {
        // إظهار الصفحة الرئيسية
        document.getElementById('home-page').classList.remove('hidden');
        // إخفاء صفحة الطالب
        document.getElementById('student-page').classList.add('hidden');
    }
</script>
    </div>

</body>
</html>
