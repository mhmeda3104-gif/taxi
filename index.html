<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP car | الرئيسية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(45deg, #0f172a, #1e293b, #334155);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-8 text-center text-white relative overflow-hidden">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>

        <div class="mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                TOP car
            </h1>
            <div class="h-1 w-12 bg-gradient-to-r from-blue-400 to-emerald-400 mx-auto mt-2 rounded-full"></div>
            <p class="text-gray-400 text-xs mt-4 font-light tracking-widest uppercase">نظام نقل الطلاب الذكي</p>
        </div>

        <div class="space-y-4">
            
            <a href="student-login.html" class="glass-button p-6 rounded-3xl group">
                <div class="flex items-center gap-4 text-right">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-blue-500/40 transition-colors">
                        🎓
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">بوابة الطلاب</h3>
                        <p class="text-[10px] text-gray-400 font-light">ابحثي عن خطك واحجزي مكانك</p>
                    </div>
                </div>
                <span class="text-xl opacity-0 group-hover:opacity-100 transition-all -translate-x-2 group-hover:translate-x-0">←</span>
            </a>

            <a href="driver-login.html" class="glass-button p-6 rounded-3xl group">
                <div class="flex items-center gap-4 text-right">
                    <div class="w-12 h-12 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-emerald-500/40 transition-colors">
                        🚕
                    </div>
                    <div>
                        <h3 class="font-bold text-lg">بوابة الكابتن</h3>
                        <p class="text-[10px] text-gray-400 font-light">سجل دخولك لإدارة رحلاتك</p>
                    </div>
                </div>
                <span class="text-xl opacity-0 group-hover:opacity-100 transition-all -translate-x-2 group-hover:translate-x-0">←</span>
            </a>

        </div>

        <div class="mt-12 flex justify-center items-center gap-2">
            <span class="relative flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">النظام متاح الآن</p>
        </div>
    </div>

</body>
</html>
